version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      minor:
        applies-to: version-updates
        update-types:
          - "major"
          - "minor"
          - "patch"

  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      minor:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"

  - package-ecosystem: "npm"
    directory: "/src/docker/unix_command"
    schedule:
      interval: "weekly"
    groups:
      minor:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"
